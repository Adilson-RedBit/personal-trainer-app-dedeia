<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meu Treino">
  <meta name="theme-color" content="#E91E63">
  <meta name="description" content="Personal Trainer App - Andreia Souza">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23E91E63' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='60' font-size='60' fill='white' text-anchor='middle' dominant-baseline='middle'%3E💪%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23E91E63' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='100' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'%3E💪%3C/text%3E%3C/svg%3E">
  <title>Meu Treino - Andreia Souza</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #E91E63, #FF69B4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      color: rgba(255, 255, 255, 0.95);
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 15px 25px;
      border-radius: 50px;
      margin-top: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      font-weight: 700;
      font-size: 18px;
      color: #E91E63;
      text-decoration: none;
      transition: all 0.3s;
    }

    .logo-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    }

    .logo-link svg {
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .logo-link {
        font-size: 16px;
        padding: 12px 20px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>💪 Meu Treino</h1>
    <p>Personal Trainer App<br>Andreia Souza</p>

    <a href="https://adilson-redbit.github.io/personal-trainer-app-dedeia/" class="logo-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="55" height="55">
        <circle cx="50" cy="50" r="45" fill="none" stroke="#E91E63" stroke-width="3"/>
        <!-- Cabeça -->
        <circle cx="50" cy="20" r="7" fill="#E91E63"/>
        <!-- Corpo -->
        <rect x="48" y="28" width="4" height="15" fill="#E91E63"/>
        <!-- Braço esquerdo com haltere -->
        <line x1="48" y1="32" x2="32" y2="20" stroke="#E91E63" stroke-width="2"/>
        <circle cx="28" cy="18" r="4" fill="#E91E63"/>
        <circle cx="25" cy="18" r="4" fill="#E91E63"/>
        <!-- Braço direito com haltere -->
        <line x1="52" y1="32" x2="68" y2="20" stroke="#E91E63" stroke-width="2"/>
        <circle cx="72" cy="18" r="4" fill="#E91E63"/>
        <circle cx="75" cy="18" r="4" fill="#E91E63"/>
        <!-- Perna esquerda -->
        <line x1="48" y1="43" x2="45" y2="65" stroke="#E91E63" stroke-width="2"/>
        <circle cx="44" cy="68" r="3" fill="#E91E63"/>
        <!-- Perna direita -->
        <line x1="52" y1="43" x2="55" y2="65" stroke="#E91E63" stroke-width="2"/>
        <circle cx="56" cy="68" r="3" fill="#E91E63"/>
      </svg>
      <span>Meu Treino</span>
    </a>
  </div>

</body>
</html>
